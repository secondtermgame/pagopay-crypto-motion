    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is PagoPay?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PagoPay is a crypto-to-fiat payment platform that bridges the gap between your digital assets and everyday spending. Deposit crypto into your account, and it's automatically converted to USD. Then use your PagoPay prepaid card to pay at millions of merchants worldwide or withdraw cash at any ATM — with zero foreign transaction fees."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get started with PagoPay?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Getting started is fast and easy. Create an account, complete your identity verification, and fund your wallet using crypto or a connected bank account. Once approved, you can request your virtual or physical PagoPay card and begin spending your funds worldwide."
          }
        },
        {
          "@type": "Question",
          "name": "Which cryptocurrencies does PagoPay support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PagoPay supports a wide range of major cryptocurrencies, including Bitcoin, Ethereum, USDT, USDC, and many others. The platform continuously expands its list of supported assets."
          }
        },
        {
          "@type": "Question",
          "name": "Are there any fees for using PagoPay?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PagoPay offers two card tiers. The Plastic Card costs $19.99 with a $3.50 monthly fee (first month free) and a 3% add-funds commission. The Metal Card costs $500 upfront covering two years with no monthly fee and a 2.5% add-funds commission. Both tiers have zero foreign exchange fees. The Metal Card includes luxury perks like Private Jet access, a Luxury Marketplace, Exclusive Member Events, and 24/7 Concierge Support."
          }
        },
        {
          "@type": "Question",
          "name": "Is my money safe with PagoPay?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. PagoPay uses AES-256 encryption, multi-factor authentication, and partners with regulated custodians like ALT 5 Sigma to safeguard user funds. All fiat card balances are held with licensed issuing banks, and PagoPay complies fully with international financial and data protection regulations."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use PagoPay internationally?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. PagoPay cards can be used worldwide anywhere major card networks are accepted. All cards currently operate in USD with zero additional foreign exchange fees when you spend in other currencies."
          }
        },
        {
          "@type": "Question",
          "name": "How long do crypto-to-fiat conversions take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Crypto-to-fiat conversions on PagoPay are processed instantly at market rates. When you load your card or initiate a swap in the app, your crypto is immediately converted to USD and made available for spending."
          }
        },
        {
          "@type": "Question",
          "name": "What should I do if my card is lost or stolen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "If your PagoPay card is lost or stolen, you can immediately freeze it within the app to prevent unauthorized use. Support is available 24/7 to assist with securing your account and issuing a replacement card."
          }
        }
      ]
    }
